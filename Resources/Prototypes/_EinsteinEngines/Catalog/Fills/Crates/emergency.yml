- type: entity
  id: CratePlasmaInternals
  parent: CrateInternals
  name: internals crate (phoron)
  description: Contains four breath masks and four phoron internals tanks. Intended for Plasmamen.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClothingMaskGas
          amount: 2
        - id: ClothingMaskBreath
          amount: 2
        - id: ExtendedEmergencyPlasmaTankFilled
          amount: 4

- type: entity
  id: CratePlasmamanEnvirosuit
  parent: CrateInternals
  name: phoron envirosuit crate
  description: Contains two full sets of envirosuits, two breath masks, and two phoron internals tanks. Intended for Plasmamen.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClothingUniformEnvirosuit
          amount: 2
        - id: ClothingHeadEnvirohelmEmpty
          amount: 2
        - id: ClothingHandsGlovesEnvirogloves
          amount: 2
        - id: ClothingMaskBreath
          amount: 2
        - id: ExtendedEmergencyPlasmaTankFilled
          amount: 2
