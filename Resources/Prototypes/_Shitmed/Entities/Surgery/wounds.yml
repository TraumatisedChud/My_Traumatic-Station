- type: entity
  id: WoundBase
  abstract: true
  components:
  - type: Wound
    damageType: Blunt
  - type: ContainerContainer
    containers:
      Traumas: !type:Container
        ents: [ ]

- type: entity
  id: Blunt
  parent: WoundBase
  components:
  - type: Wound
    damageType: Blunt
    woundType: External
    woundVisibility: Always
    scarWound: BluntScar
    mangleSeverity: Severe
    textString: Blunt
  - type: TraumaInflicter
    severityThreshold: 12
    allowedTraumas:
    - Dismemberment
    - OrganDamage
    - BoneDamage
    - VeinsDamage
    allowArmourDeduction:
    - Dismemberment
    - OrganDamage
    - BoneDamage
    - VeinsDamage
    traumasChances:
      Dismemberment: -2
      OrganDamage: 0.17
      BoneDamage: 0.8
      VeinsDamage: 0
    mangledMultipliers:
      BoneDamage: 1

- type: entity
  parent: Blunt
  id: Fracture
  name: fracture
  components:
  - type: TraumaInflicter
    minTraumaSeverityDelta: 0
    traumasChances:
      Dismemberment: -1.5
      OrganDamage: 0.2
      BoneDamage: 0.9
      VeinsDamage: 0
    mangledMultipliers:
      BoneDamage: 1.2

