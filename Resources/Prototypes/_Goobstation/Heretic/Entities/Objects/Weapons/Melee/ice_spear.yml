- type: entity
  name: Glacier Spear
  parent: [BaseItem, SolutionSpear, BaseMagicalContraband]
  id: SpearIceHeretic
  description: When the veil between frost and and reality thins, the spear shall bite with the might of the Winter Dawn.
  components:
  - type: EmbeddableProjectile
    offset: -0.15,0.0
  - type: ThrowingAngle
    angle: 225
  - type: LandAtCursor
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.08,-0.06
          - -0.06,-0.08
          - 0.40,0.30
          - 0.30,0.40
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Sharp
  - type: Tool
    qualities:
    - Slicing
  - type: Sprite
    sprite: _Goobstation/Heretic/Entities/ice_spear.rsi
    layers:
    - state: spear
  - type: MeleeWeapon
    animationRotation: -135 # WWDP
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 12
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: DamageOtherOnHit
    ignoreResistances: true
    increaseOnly: true
    damage:
      types:
        Piercing: 5
        Cold: 25
  - type: Item
    size: Ginormous
  - type: Clothing
    quickEquip: false
    slots:
    - back
    - suitStorage
  - type: MeleeChemicalInjector
    transferAmount: 2
    solution: melee
  - type: RefillableSolution
    solution: melee
  - type: InjectableSolution
    solution: melee
  - type: SolutionInjectOnEmbed
    transferAmount: 8 # Since it is shattered on hit - inject everything
    solution: melee
  - type: Solution
    id: melee
    solution:
      maxVol: 8
  - type: SolutionTransfer
    maxTransferAmount: 8
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 10
  - type: UseDelay
  - type: ThrowableBlocked
  - type: ChangeTemperatureOnHit
    heat: -50000
  - type: ReflectiveSurface
  - type: RecallableItem
    actionId: ActionHereticIceSpear
    userWhitelist:
      components:
      - Heretic
      - Ghoul
    whitelistCheckMind: true
  - type: TriggerOnThrowDoHit
  - type: TriggerOnGotEquippedHand
  - type: EmitSoundOnTrigger
    sound:
      collection: GlassBreak
    positional: true
    predicted: false
  - type: DeleteOnTrigger
  - type: GenericTriggerCondition
    checkUser: true
    condition: !type:AllConditions
      conditions:
      - !type:ProtectedByNullRodCondition
        inverted: true
      - !type:WhitelistCondition
        whitelist:
          components:
          - MobState
      - !type:WhitelistCondition
        inverted: true
        checkMind: true
        whitelist:
          components:
          - Ghoul
          - Heretic
  - type: EntityEffectOnTrigger
    targetUser: true
    effects:
    - !type:AddComponents
      components:
      - type: IceCube
  - type: IgniteOnMeleeHit
    fireStacks: -5
