- type: entity
  parent: [ ClothingMaskBase, BaseMagicalContraband ]
  id: ClothingMaskMadHeretic
  name: abyssal mask
  description: A mask created from suffering. When you look into its eyes, it looks back.
  components:
  - type: UnholyItem
  - type: FaceHuggerBlocker
  - type: NightVision
    action: ActionToggleAbyssalMask
    enabled: false
    relayOverlay: true
    overlayColor: "#FFFFFF33"
    noiseAmount: 1
    noiseMultiplier: 2
  - type: MadnessMask
  - type: Sprite
    sprite: _Goobstation/Heretic/mad_mask.rsi
  - type: Clothing
    sprite: _Goobstation/Heretic/mad_mask.rsi
  - type: BreathMask
  - type: IdentityBlocker
  - type: Tag
    tags:
    - Mask
    - WhitelistChameleon
    - HereticItem
    - FlashIgnoreResistances
  - type: HideLayerClothing
    slots:
    - Snout
