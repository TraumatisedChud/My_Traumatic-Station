- type: entity
  parent: [ BaseMinorContraband, Handcuffs ]
  id: BarbHandcuffs # TODO: Needs to damage on remove attempt
  name: barbed wire handcuffs
  description: Used to detain people you intend to kill.
  components:
  - type: Handcuff
    cuffedRSI: _Trauma/Objects/Misc/cuffs_barbwire.rsi
    bodyIconState: body-overlay
  - type: Sprite
    sprite: _Trauma/Objects/Misc/cuffs_barbwire.rsi
    state: icon
  - type: UseDelay
    delay: 3
  - type: Construction
    graph: BarbCuffs
    node: finish

- type: entity
  parent: AbductorHandcuffs
  id: WonderprodCuffs
  name: printed wondercuffs
  description: Made out of a metal more durable than anything Nanotrasen could dream of. Dissolves when removed.
  components:
  - type: Handcuff
    breakOnRemove: true
    brokenPrototype: Ash
