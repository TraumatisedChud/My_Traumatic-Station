- type: entity
  parent: BasePhysicalKnowledge
  id: ToughnessKnowledge
  name: Toughness
  description: How resistant your ha and ka are to damage.
  components:
  - type: Knowledge
    experienceCost: 20
  - type: ExperienceOnDamage # kenshi parity
  - type: DamageModifyKnowledge
    # same as stamina damage im lazy
    # no debuff for lvl 0
    curve: !type:QuadraticSkillCurve # Todo, make linear
      skillScale: 0.6
      skillOffset: -2.8
      curveScale: 0.05
      curveOffset: 0.6

- type: entity
  parent: BasePhysicalKnowledge
  id: StrengthKnowledge
  name: Strength
  description: How powerful your arm muscles are, mostly affects melee weapons.
  components:
  - type: Knowledge
    experienceCost: 12
  - type: MeleeDamageKnowledge
    # -12% to +25%, no change around lvl 45
    curve: !type:CubicSkillCurve
      skillScale: 1.13
      skillOffset: -0.5
      curveOffset: 1

- type: entity
  parent: BasePhysicalKnowledge
  id: AthleticsKnowledge
  name: Athletics
  description: Gives you more stamina, making it harder to stun you among other things. Also allows you to parry attacks and reflect lasers.
  components:
  - type: Knowledge
    experienceCost: 12
  - type: StaminaKnowledge
    # no debuff at lvl 0, 37% damage reduction at lvl 100
    # you are in good shape not insulated from batong
    curve: !type:QuadraticSkillCurve # Todo, make linear
      skillScale: 0.6
      skillOffset: -2.8
      curveScale: 0.05
      curveOffset: 0.6

- type: entity
  parent: BasePhysicalKnowledge
  id: ThrowingKnowledge
  name: Throwing
  description: Makes you throw items faster and with more precision.
  components:
  - type: Knowledge
    experienceCost: 5
  - type: ThrowInsertKnowledge # being better at throwing lets you slam dunk easier
    curve: !type:QuadraticSkillCurve
