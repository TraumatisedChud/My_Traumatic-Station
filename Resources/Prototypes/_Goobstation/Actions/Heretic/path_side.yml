- type: entity
  parent: BaseAction
  id: ActionHereticRealignment
  name: Realignment
  description: Recover from all stuns knockdowns, and restraints, gaining short term pacifism.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 10
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: realignment
  - type: InstantAction
    event: !type:EventHereticRealignment
      removedEffects:
      - StatusEffectStunned
      - StatusEffectForcedSleeping
      - StatusEffectDrowsiness
  - type: HereticAction
    requireMagicItem: false
  - type: SpeakOnAction
    sentence: heretic-speech-realignment

- type: entity
  parent: BaseAction
  id: ActionHereticIceSpear
  name: Mysteries of Creation
  description: Recall the Glacier Spear to you.
  components:
  - type: Action
    detachedItemAction: true
    checkCanInteract: true
    useDelay: 5
    itemIconStyle: NoItem
    sound:
      path: /Audio/_Goobstation/Heretic/ice_shovel.ogg
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: ice_spear
  - type: InstantAction
    event: !type:RecallItemEvent
  - type: SpeakOnAction
    sentence: heretic-speech-ice-spear

- type: entity
  parent: BaseAction
  id: ActionHereticCleave
  name: Crimson Cleave
  description: A targeted spell that heals you while damaging the enemies. It cleanses you of all wounds as well.
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: blood_siphon
    checkCanInteract: false
  - type: TargetAction
    checkCanAccess: false
    range: 5
  - type: EntityTargetAction
    event: !type:EventHereticCleave
    canTargetSelf: false
    whitelist:
      components:
      - MobState

  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-bloodsiphon

- type: entity
  parent: BaseAction
  id: ActionActivateEmp
  name: Activate EMP
  description: Triggers EMP pulse around you
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 30
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Objects/Weapons/Grenades/empgrenade.rsi
      state: icon
  - type: InstantAction
    event: !type:EventEmp

- type: entity
  id: ActionHereticSpacePhase
  name: Space Phase
  description: Allows you to phase in and out of existence while in space or a low-pressure, outdoor area.
  components:
  - type: Action
    predicted: false
    checkCanInteract: false
    useDelay: 3
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: space_phase
  - type: InstantAction
    event: !type:EventHereticSpacePhase
  - type: HereticAction
    requireMagicItem: true

- type: entity
  id: ActionMirrorJaunt
  name: Mirror Walk
  description: Allows you to traverse invisibly and freely across the station within the realm of the mirror. You can only enter and exit the realm of mirrors when near reflective items and surfaces, such windows or mirrors.
  components:
  - type: Action
    predicted: false
    checkCanInteract: false
    useDelay: 6
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/eldritch_mobs.rsi
      state: maid
  - type: InstantAction
    event: !type:EventMirrorJaunt
  - type: HereticAction
    requireMagicItem: true

- type: entity
  parent: BaseAction
  id: ActionHereticForestAdmonitions
  name: Forest Admonitions
  description: Completely conceals your identity, and makes you invisible. Can be activated early to disable it. While cloaked, you move slightly faster, but undergo actions much slower. Taking damage while cloaked may cause it to lift suddenly. Spreads pale fog around while active.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 6
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: palecloak
  - type: InstantAction
    event: !type:EventHereticCloak
      status: ShadowCloakPaleStatusEffect
      lifetime: 360
  - type: HereticAction
    requireMagicItem: true
  - type: Tag
    tags:
    - ShadowCloakAction
