- type: entity
  parent: [ OrganBaseWings, OrganMothExternal ]
  id: OrganMothWings
  components:
  - type: Sprite
    sprite: _Trauma/Mobs/Species/Moth/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _Trauma/empty.rsi
      state: empty # no sprite since the markings actually control it
  - type: SpeedModifierOrgan
    weightlessAcceleration: 0.5 # 50% faster base acceleration in space/0G
  - type: DashWings
    speciesWhitelist:
    # need to have a body adapted to controlling wings
    # every species still gets tackle bonus and innate tackle but it knocks you down and doesn't dodge bullets
    # if you aren't moth or vox
    - Moth
    - Vox # They are birds I guess
    toAdd:
    - type: TackleModifier # Innate tackle
      allowCollision: false
      speedMultiplier: 1
      rangeMultiplier: 1
      cooldownMultiplier: 2.167 # Roughly 6.5s
      userEffect: MothDash

- type: entity
  parent: OrganMothWings
  id: OrganMothWingsDefault
  suffix: Moth, Default
  components:
  - type: Sprite
    color: "#FFDA93FF"
  - type: VisualOrgan
    profile:
      skinColor: "#FFDA93FF"
  - type: VisualOrganMarkings
    markings:
      Wings:
      - markingId: MothWingsDefault
        markingColor: [ "#FFDA93FF" ]

- type: entityEffect
  id: MothDash
  conditions:
  - !type:AnyCondition
    conditions:
    - !type:SpeciesCondition
      species: Moth
    - !type:SpeciesCondition
      species: Vox
  effects:
  - !type:Emote
    emote: Flip
  - !type:PlaySoundEffect
    positional: false
    sound: /Audio/_Goobstation/Effects/moth_wings.ogg
  - !type:ModifyStatusEffect
    effectProto: StatusEffectProjectileImmunity # Dark souls
    time: 0.65
