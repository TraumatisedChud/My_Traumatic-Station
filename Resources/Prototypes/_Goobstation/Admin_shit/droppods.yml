- type: entity
  parent: BaseItem
  id: DropPodspawner
  name: drop pod (items)
  description: Place items you want players to recieve in the bag, activate it over where you want the pod to drop. Players cannot see the pod.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/DropPod/item.rsi
    state: DROPPOD
  - type: Item
    size: Ginormous
  - type: Storage
    grid:
    - 0,0,20,20
    maxItemSize: Ginormous
  - type: Visibility
    layer: 2 #ghost layer
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      droppod_container: !type:Container
  - type: ExtendedContainer
    containerName: droppod_container
    deleteContentsOnBreak: false
    capacity: 999
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: TriggerOnUse
  - type: TimerTrigger
    delay: 0.9
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          SpawnSupplyEmpty:
            min: 1
            max: 1
    - trigger:
        !type:DamageTrigger
        damage: 1100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: AnchorOnTrigger
  - type: TwoStageTrigger
    keysIn:
    - timer
    triggerDelay: 1
    components:
    - type: DamageOverTime
      damage:
        types:
          Slash: 50
      interval: 0.5
      ignoreResistances: true

