- type: entity
  abstract: true
  parent: BaseItem
  id: BaseBrainChip
  name: brain chip
  description: A sterilized microchip assembly that can directly interface with the brain.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Specific/brain_chips.rsi
    layers:
    - state: icon
  - type: Item
    size: Tiny
  - type: Inorganic
  - type: OrganChip
    parents: [ Brain, IPCBrain ]
  - type: Cybernetics
    disableChance: 0.1 # should be a rare funny thing rather than common huge annoyance
    empDamage:
      types: {} # losing your skills is the focus
  # TODO: brain chips guide examine

- type: entity
  abstract: true
  parent: BaseBrainChip
  id: BaseSkillChipMRAM
  name: MRAM-chip
  description: A sterilized microchip assembly that can directly interface with the brain. This one can rewire the brain to give you memories of skills you never learned.
  components:
  # TODO: sprite
  - type: KnowledgeGrantOnWear
    examinable: true

- type: entity
  abstract: true
  parent: [BaseSkillChipMRAM, BaseSecurityContraband]
  id: BaseSkillChipAPTR
  name: APTR-Chip
  description: A sterilized microchip assembly that can directly interface with the brain. This one can rewire the brain to give you reflexes and intrinsic knowledge on weaponry.

- type: entity
  abstract: true
  parent: [BaseSkillChipMRAM, BaseSecurityContraband]
  id: BaseSkillChipPSON
  name: PSON-Chip
  description: A sterilized microchip assembly that can directly interface with the brain. This one rewires the brain to weaken innate skills and overwrite personalities.
  components:
  - type: UnremoveableOrgan

- type: entity
  abstract: true
  parent: [BaseSkillChipMRAM, BaseSecurityContraband]
  id: BaseSkillChipHPYS
  name: HPYS-Chip
  description: A sterilized microchip assembly that can directly interface with the brain. This one changes hormone balances to enhance physical traits.
# TODO: move job bonuses like surgery speed to skillchips if someone writes a generic component field setting thing, basically automatic vvwrite
